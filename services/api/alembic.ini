# Alembic config. The DB URL is intentionally NOT set here — env.py pulls it
# from app.config (which reads DATABASE_URL from the env / root .env), so there
# is a single source of truth and no connection string ever lives in git.

[alembic]
script_location = alembic
prepend_sys_path = .
# Migration filenames: 0001_slug.py, 0002_slug.py, ...
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
